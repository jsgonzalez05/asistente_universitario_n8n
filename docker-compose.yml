version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n_asistente
    restart: always
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_CORS_ALLOWED_ORIGINS=* # Permite que el grabador HTML envíe datos
      # Desbloqueo de seguridad total para expresiones
      - N8N_BLOCK_ENV_ACCESS_IN_EXPRESSIONS=false
      # Mapeo directo para n8n Variables ($vars)
      - N8N_VARIABLES_SHEET_ID=${SHEET_ID}
      - N8N_VARIABLES_TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
